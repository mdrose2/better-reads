{% extends "admin/base.html" %}
{% load static %}

{% block branding %}
<div id="site-name" style="display: flex; align-items: center; gap: 10px;">
    <img src="{% static 'favicon/favicon.svg' %}" alt="Better Reads" style="height: 30px; width: 30px;">
    <a href="{% url 'admin:index' %}" style="color: white; text-decoration: none; font-size: 1.2rem; font-weight: 600;">
        Better Reads <span style="font-size: 0.9rem; opacity: 0.8;">Administration</span>
    </a>
</div>
{% endblock %}

{% block nav-global %}{% endblock %}

{% block userlinks %}
    {{ block.super }}
    <a href="/" target="_blank" style="border-left: 1px solid rgba(255,255,255,0.3); padding-left: 10px; margin-left: 10px;">
        📚 View Site
    </a>
{% endblock %}
