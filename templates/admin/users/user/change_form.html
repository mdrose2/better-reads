<!-- templates/admin/users/user/change_form.html -->
{% extends "admin/change_form.html" %}
{% load i18n admin_urls static %}

{% block extrastyle %}
  {{ block.super }}
  <style>
    /* Same green theme as reviews */
    #header {
      background: #28a745;
      color: white;
    }
    
    #branding h1 {
      color: white;
      font-weight: 600;
    }
    
    #branding h1 a {
      color: white;
      text-decoration: none;
    }
    
    #user-tools a {
      color: white;
      border-bottom: 1px solid rgba(255,255,255,0.3);
    }
    
    div.breadcrumbs {
      background: #218838;
    }
    
    .module h2, .module caption {
      background: #28a745;
      color: white;
      padding: 10px;
      border-radius: 4px 4px 0 0;
    }
    
    .button, input[type=submit], input[type=button], .submit-row input, a.button {
      background: #28a745;
    }
    
    .button:hover, input[type=submit]:hover, input[type=button]:hover {
      background: #218838;
    }
    
    .button.default, input[type=submit].default, .submit-row input.default {
      background: #28a745;
    }
    
    input[type=text], input[type=password], input[type=email], textarea, select {
      border: 1px solid #ced4da;
      border-radius: 4px;
      padding: 8px;
      width: 100%;
      max-width: 600px;
    }
    
    input[type=text]:focus, input[type=password]:focus, input[type=email]:focus, textarea:focus, select:focus {
      border-color: #28a745;
      outline: none;
      box-shadow: 0 0 0 2px rgba(40, 167, 69, 0.2);
    }
    
    fieldset.module {
      border: 1px solid #dee2e6;
      border-radius: 8px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    
    .submit-row {
      background: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
    }
    
    .deletelink {
      background: #dc3545 !important;
    }
    
    .deletelink:hover {
      background: #c82333 !important;
    }
  </style>
{% endblock %}

{% block content %}
  <div id="content-main" style="width: 100%; max-width: 800px; margin: 0 auto;">
    <!-- Custom branded header -->
    <div style="margin-bottom: 20px; padding: 15px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px;">
      <h2 style="margin: 0; color: #28a745; display: flex; align-items: center; gap: 10px;">
        <span style="font-size: 1.5rem;">👤</span>
        {% if add %}
          Add {{ opts.verbose_name }}
        {% else %}
          Edit {{ opts.verbose_name }}
        {% endif %}
      </h2>
    </div>
    
    {{ block.super }}
  </div>
{% endblock %}
